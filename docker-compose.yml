services:
  postgres:
    image: postgres:15-alpine
    container_name: argos-postgres
    environment:
      POSTGRES_DB: argos
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: argos
    ports:
      - "5434:5432"
    volumes:
      - postgres_argos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos -d argos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: argos-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_argos_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: argos-api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://argos:argos@postgres:5432/argos
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
      - storage_argos_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    container_name: argos-worker
    command: sh -c "alembic upgrade head && celery -A app.core.celery_app.celery_app worker --loglevel=info"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://argos:argos@postgres:5432/argos
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - storage_argos_data:/app/storage
    depends_on:
      - api
      - redis

  beat:
    build: ./backend
    container_name: argos-beat
    command: sh -c "alembic upgrade head && celery -A app.core.celery_app.celery_app beat --loglevel=info"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://argos:argos@postgres:5432/argos
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - worker
      - redis

  frontend:
    image: node:22-alpine
    container_name: argos-frontend
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8002
    ports:
      - "5175:5175"
    volumes:
      - ./frontend/argos-web:/app
      - frontend_argos_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_argos_data:
  redis_argos_data:
  storage_argos_data:
  frontend_argos_node_modules:
