services:
  - type: web
    name: argos-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: argos-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: ARGOS
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite:////var/data/argos.db
      - key: API_V1_PREFIX
        value: /api/v1
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: AUTO_CREATE_LITE_TABLES
        value: "true"
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_FALLBACK_PROVIDER
        value: openai
      - key: LLM_TIMEOUT_SECONDS
        value: "45"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_DEFAULT_MODEL
        value: openrouter/auto
      - key: OPENROUTER_HTTP_REFERER
        sync: false
      - key: OPENROUTER_X_TITLE
        value: ARGOS
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_DEFAULT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TIMEOUT_SECONDS
        value: "45"

  - type: web
    name: argos-web
    runtime: static
    rootDir: frontend/argos-web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: 20.19.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
